<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIVN</title>
    <link rel="icon" href="ds.png" type="image/x-icon"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700;800;900&display=swap');
        
        :root {
            --primary: #ff3e00;
            --primary-dark: #e53600;
            --accent: #00ff88;
            --dark: #0a0a0a;
            --light: #f5f5f5;
            --gray: #1a1a1a;
            --gray-light: #333;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: var(--dark);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            position: relative;
            z-index: 10;
        }
        
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--light);
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        .logo span {
            color: var(--primary);
            margin-right: 5px;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-links a {
            color: var(--light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-links a:hover {
            color: var(--primary);
        }
        
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* Hero Section */
        .hero {
            position: relative;
            padding: 80px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 80vh;
            justify-content: center;
        }
        
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 62, 0, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 20%, rgba(0, 255, 136, 0.1) 0%, transparent 30%);
            z-index: -1;
        }
        
        .hero-content {
            max-width: 800px;
        }
        
        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 20px;
            line-height: 1;
            text-transform: uppercase;
        }
        
        .hero-title span {
            color: var(--primary);
            position: relative;
            display: inline-block;
        }
        
        .hero-title span::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 2px;
        }
        
        .hero-tagline {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #ccc;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        /* Countdown */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .countdown-item {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px 15px;
            min-width: 110px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .countdown-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }
        
        .countdown-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
            font-family: 'Montserrat', sans-serif;
        }
        
        .countdown-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ccc;
            font-weight: 500;
        }
        
        /* Progress bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
            max-width: 600px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 3px;
            transition: width 1s ease;
        }
        
        /* Message and CTA */
        .message {
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: #ccc;
            font-weight: 500;
        }
        
        .cta-button {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            color: var(--light);
            border: none;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 62, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }
        
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 62, 0, 0.4);
        }
        
        .cta-button:hover::before {
            left: 100%;
        }
        
        .cta-button:disabled {
            background: var(--gray-light);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .cta-button:disabled::before {
            display: none;
        }
        
        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 50px;
        }
        
        .social-link {
            color: #ccc;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .social-link:hover {
            color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 62, 0, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--gray);
            color: var(--light);
            border-radius: 8px;
            transform: translateX(150%);
            transition: transform 0.5s ease;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification i {
            color: var(--primary);
            font-size: 1.2rem;
        }
        
        /* Email Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal.show {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: var(--gray);
            padding: 40px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        
        .modal.show .modal-content {
            transform: translateY(0);
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .modal-close:hover {
            color: var(--primary);
        }
        
        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--light);
            text-align: center;
        }
        
        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #ccc;
        }
        
        .form-input {
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--gray-light);
            background: var(--dark);
            color: var(--light);
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-submit {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            color: var(--light);
            border: none;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .form-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 62, 0, 0.3);
        }
        
        /* Mobile Styles */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .mobile-menu-btn {
                display: block;
            }
            
            .hero-title {
                font-size: 3.5rem;
            }
            
            .countdown {
                gap: 10px;
            }
            
            .countdown-item {
                min-width: 80px;
                padding: 15px 10px;
            }
            
            .countdown-number {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .hero-title {
                font-size: 2.8rem;
            }
            
            .countdown-item {
                min-width: 70px;
                padding: 12px 8px;
            }
            
            .countdown-number {
                font-size: 1.8rem;
            }
            
            .countdown-label {
                font-size: 0.7rem;
            }
            
            .cta-button {
                padding: 12px 30px;
                font-size: 0.9rem;
            }
        }
        
        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 1s ease forwards;
        }
        
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title fade-in">DRIVN BY PASSION.</h1>
                <p class="hero-tagline fade-in delay-1">BE YOURSELF. STAY DRIVN.</p>
                
                <div class="countdown fade-in delay-2">
                    <div class="countdown-item">
                        <div class="countdown-number" id="days">00</div>
                        <div class="countdown-label">Days</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="hours">00</div>
                        <div class="countdown-label">Hours</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="minutes">00</div>
                        <div class="countdown-label">Minutes</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="seconds">00</div>
                        <div class="countdown-label">Seconds</div>
                    </div>
                </div>
                
                <div class="progress-container fade-in delay-3">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                
                <p class="message fade-in delay-3" id="message">THE DROP IS NEAR.</p>
                
                <div class="social-links fade-in delay-4">
                    <a style="text-decoration: none;" href="https://www.instagram.com/drivnclothes/profilecard/?igsh=MTh5aGJkNjMwN3EwZw==" class="social-link">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a style="text-decoration: none;" href="https://www.facebook.com/profile.php?id=61577988812563&mibextid=ZbWKwL" class="social-link">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a style="text-decoration: none;" href="https://www.tiktok.com/@drivnclothes" class="social-link">
                        <i class="fab fa-tiktok"></i>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Set the launch date (10 days from now)
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 10);
        launchDate.setHours(19, 0, 0, 0); // Set to 7:00 PM
        
        // DOM Elements
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const progressBar = document.getElementById('progress-bar');
        const messageEl = document.getElementById('message');
        const notifyBtn = document.getElementById('notify-btn');
        const notification = document.getElementById('notification');
        const emailModal = document.getElementById('email-modal');
        const modalClose = document.getElementById('modal-close');
        const emailForm = document.getElementById('email-form');
        
        // Initialize countdown from localStorage if available
        let savedCountdown = localStorage.getItem('drivnCountdown');
        if (savedCountdown) {
            launchDate.setTime(JSON.parse(savedCountdown));
        } else {
            localStorage.setItem('drivnCountdown', JSON.stringify(launchDate.getTime()));
        }
        
        // Calculate percentage of time passed
        const startDate = new Date(launchDate.getTime() - (10 * 24 * 60 * 60 * 1000)); // 10 days before launch
        const totalTime = launchDate - startDate;
        
        // Update countdown
        function updateCountdown() {
            const now = new Date();
            const difference = launchDate - now;
            
            if (difference <= 0) {
                // Countdown finished
                daysEl.textContent = '00';
                hoursEl.textContent = '00';
                minutesEl.textContent = '00';
                secondsEl.textContent = '00';
                progressBar.style.width = '100%';
                messageEl.textContent = 'THE DROP IS LIVE! SHOP NOW!';
                notifyBtn.textContent = 'SHOP NOW';
                notifyBtn.disabled = false;
                return;
            }
            
            // Calculate time units
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            
            // Update DOM
            daysEl.textContent = days.toString().padStart(2, '0');
            hoursEl.textContent = hours.toString().padStart(2, '0');
            minutesEl.textContent = minutes.toString().padStart(2, '0');
            secondsEl.textContent = seconds.toString().padStart(2, '0');
            
            // Update progress bar
            const timePassed = totalTime - difference;
            const percentage = Math.min((timePassed / totalTime) * 100, 100);
            progressBar.style.width = `${percentage}%`;
            
            // Update message based on time remaining
            if (days === 0 && hours === 0 && minutes < 10) {
                messageEl.textContent = 'GET READY! THE DROP IS IMMINENT!';
            } else if (days === 0) {
                messageEl.textContent = 'ALMOST THERE! THE DROP IS TODAY!';
            } else if (days < 3) {
                messageEl.textContent = 'GET READY! THE DROP IS APPROACHING!';
            } else {
                messageEl.textContent = 'THE DROP IS NEAR.';
            }
        }
        
        // Initial call
        updateCountdown();
        
        // Update every second
        setInterval(updateCountdown, 1000);
        
        // Notify button functionality
        notifyBtn.addEventListener('click', function() {
            emailModal.classList.add('show');
        });
        
        // Close modal
        modalClose.addEventListener('click', function() {
            emailModal.classList.remove('show');
        });
        
        // Email form submission
        emailForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email');
            const email = emailInput.value;
            
            if (email) {
                // Save to localStorage
                let emails = JSON.parse(localStorage.getItem('drivnEmails')) || [];
                emails.push(email);
                localStorage.setItem('drivnEmails', JSON.stringify(emails));
                
                // Show notification
                notification.classList.add('show');
                
                // Hide notification after 3 seconds
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
                
                // Close modal and reset form
                emailModal.classList.remove('show');
                emailInput.value = '';
            }
        });
        
        // Close modal when clicking outside
        window.addEventListener('click', function(e) {
            if (e.target === emailModal) {
                emailModal.classList.remove('show');
            }
        });
        
        // Parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;
            document.querySelector('.hero-bg').style.transform = `translateX(${x}px) translateY(${y}px)`;
        });
        
        // Animate elements on scroll
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('fade-in');
                }
            });
        }, observerOptions);
        
        // Observe all elements with fade-in class
        document.querySelectorAll('.fade-in').forEach(el => {
            observer.observe(el);
        });
    </script>
</body>
</html>
